<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard - UrbanHelps</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">👷 UrbanHelps Worker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showTab('jobs')">Available Jobs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showTab('active')">My Jobs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="toggleTracking()" id="trackingToggle">🔴 Start Tracking</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-warning btn-sm ms-2" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4">
        <!-- Available Jobs Tab -->
        <div id="jobsTab" class="tab-content">
            <h2 class="mb-4">🔍 Available Jobs</h2>
            <div id="jobsList" class="row"></div>
        </div>

        <!-- My Jobs Tab -->
        <div id="activeTab" class="tab-content" style="display:none;">
            <h2 class="mb-4">⏳ My Active Jobs</h2>
            <div id="myJobsList" class="row"></div>
        </div>
    </div>

    <!-- Location Permission Modal -->
    <div id="permissionModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">📍 Location Permission Required</h5>
                </div>
                <div class="modal-body">
                    <p>To enable real-time tracking, UrbanHelps needs access to your location.</p>
                    <p class="text-muted small">This helps customers see your live location and estimated arrival time.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Not Now</button>
                    <button type="button" class="btn btn-danger" onclick="requestLocationPermission()">Enable Location</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/worker.js"></script>
</body>
</html>
